name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create releases for pushed commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE: ${{ github.event.before }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"

          if [[ -n "${BEFORE:-}" && "${BEFORE}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            COMMITS="$(git rev-list --reverse "${BEFORE}..${GITHUB_SHA}")"
          else
            COMMITS="${GITHUB_SHA}"
          fi

          for COMMIT_SHA in ${COMMITS}; do
            SHORT_SHA="${COMMIT_SHA::7}"
            TAG="v${VERSION}-${SHORT_SHA}"

            if gh release view "${TAG}" >/dev/null 2>&1; then
              echo "Release ${TAG} already exists, skipping."
              continue
            fi

            gh release create "${TAG}" \
              --target "${COMMIT_SHA}" \
              --title "${TAG}" \
              --generate-notes \
              --prerelease
          done
